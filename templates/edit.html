<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Idea – {{ app_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">{{ app_name }}</a>
    <span class="text-muted small">Edit idea #{{ idea['id'] }}</span>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title mb-3">Edit Idea</h5>
          <form method="post" action="">
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input name="title" class="form-control" value="{{ idea['title'] }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Notes</label>
              <textarea name="notes" class="form-control" rows="4" required>{{ idea['notes'] }}</textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Tags (comma separated)</label>
              <input name="tags" class="form-control" value="{{ idea['tags'] }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Mood (1–5)</label>
              <input name="mood" type="number" class="form-control" min="1" max="5" value="{{ idea['mood'] }}" required>
            </div>
          <div class="mb-3">
            <label class="form-label">Due date</label>
            <input name="due_date" type="date" class="form-control" value="{{ idea['due_date'] }}">
          </div>
            <div class="mb-3">
              <label class="form-label">Status</label>
              <select name="status" class="form-select">
                {% set status_val = idea.get('status', 'Not Started') %}
                {% for opt in ['Not Started','In Progress','Completed'] %}
                  <option value="{{ opt }}" {% if status_val == opt %}selected{% endif %}>{{ opt }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Priority</label>
              {% set pr = idea.get('priority', 'Medium') %}
              <select name="priority" class="form-select">
                <option value="High" {% if pr == 'High' %}selected{% endif %}>High</option>
                <option value="Medium" {% if pr == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Low" {% if pr == 'Low' %}selected{% endif %}>Low</option>
              </select>
            </div>
            <button class="btn btn-primary">Save</button>
            <a href="/" class="btn btn-outline-secondary ms-2">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
